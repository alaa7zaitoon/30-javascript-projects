<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photo editing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaQuery.css">
</head>
<body>
    
    <div class="container">
        <heading>
            <h1>Update CSS Variables with <span>JS</span></h1>
        </heading>

        <div class="controls">
            <label for="spacing">Spacing</label>
            <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">


            <label for="blur">Blur</label>
            <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

            <label for="color">Base Color</label>
            <input id="color" type="color" name="base" value="#ffc600">
        </div>
        
        <img src="https://png.pngtree.com/thumb_back/fh260/background/20250423/pngtree-serene-mountain-river-flowing-through-a-lush-green-valley-surrounded-by-image_17213912.jpg" alt="Image of a mountain river flowing through a lush green valley surrounded by mountains">


    </div>
  
    <script src="index.js"></script>
</body>
</html>
